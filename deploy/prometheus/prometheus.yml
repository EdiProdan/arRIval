global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingester
    static_configs:
      - targets: ["ingester:9101"]

  - job_name: processor
    static_configs:
      - targets: ["processor:9102"]

  - job_name: aggregator
    static_configs:
      - targets: ["aggregator:9103"]

  - job_name: realtime
    static_configs:
      - targets: ["realtime:9104"]
