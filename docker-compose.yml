services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.11
    container_name: arrival-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
    ports:
      - 19092:19092
      - 19644:9644
      - 18082:18082
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  staticsync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrival-staticsync
    command: ["staticsync", "-data-dir", "data"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: "no"

  ingester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrival-ingester
    command: ["ingester"]
    env_file:
      - .env
    environment:
      - ARRIVAL_KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
      staticsync:
        condition: service_completed_successfully
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrival-processor
    command: ["processor"]
    env_file:
      - .env
    environment:
      - ARRIVAL_KAFKA_BROKERS=redpanda:9092
      - ARRIVAL_STATIC_DIR=data
      - ARRIVAL_BRONZE_DIR=data/bronze
      - ARRIVAL_SILVER_DIR=data/silver
    depends_on:
      redpanda:
        condition: service_healthy
      staticsync:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrival-aggregator
    command: ["aggregator"]
    env_file:
      - .env
    environment:
      - ARRIVAL_KAFKA_BROKERS=redpanda:9092
      - ARRIVAL_GOLD_DIR=data/gold
    depends_on:
      redpanda:
        condition: service_healthy
      staticsync:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  realtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arrival-realtime
    command: ["realtime"]
    env_file:
      - .env
    environment:
      - ARRIVAL_KAFKA_BROKERS=redpanda:9092
      - ARRIVAL_REALTIME_HTTP_ADDR=:8080
    depends_on:
      redpanda:
        condition: service_healthy
      staticsync:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    ports:
      - 8080:8080
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: arrival-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
    depends_on:
      - ingester
      - processor
      - aggregator
      - realtime

  grafana:
    image: grafana/grafana:11.6.0
    container_name: arrival-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - 3000:3000

volumes:
  redpanda_data:
  grafana_data:
